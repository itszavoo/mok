<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena</title>

<style>
/* SAME CSS — UNCHANGED */
body{
  margin:0;
  font-family:Arial;
  background:#2673E8;
}

.corner{position:fixed;z-index:10;}
#moku{top:12px;left:12px;width:70px;}
#ga{top:12px;right:12px;width:70px;}
#star{bottom:12px;left:12px;width:65px;}

#watermark{
  position:fixed;
  bottom:12px;
  right:12px;
  color:white;
  font-weight:bold;
}

.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

#logo{
  width:260px;
  margin-bottom:35px;
  margin-top:-40px;
}

#quiz #logo{
  margin-top:-60px;
}

#enterWrap{
  display:flex;
  align-items:center;
  gap:12px;
}

.sword{font-size:22px;}

#enterBtn{
  padding:14px 36px;
  font-size:18px;
  background:#00c853;
  border:2px solid black;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.subtitle{
  color:white;
  font-weight:bold;
  margin-top:16px;
  font-size:18px;
}

.box{
  background:black;
  color:white;
  padding:20px;
  width:100%;
  max-width:480px;
  border-radius:14px;
}

#progressBarWrap{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:#00c853;
}

#timerBarWrap{
  width:100%;
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

#timerBar{
  height:100%;
  width:100%;
  background:#ff3b30;
}

.option{
  background:white;
  color:black;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.correct{
  background:#00c853 !important;
  box-shadow:0 0 12px #00ff88;
}

.wrong{background:#ff3b30 !important;}

.card{
  background:#00c853;
  border:3px solid black;
  border-radius:12px;
  width:320px;
  overflow:hidden;
  position:relative;
}

.card-top{
  display:flex;
  justify-content:center;
  align-items:center;
  height:140px;
}

.card-top img{
  max-height:110px;
}

.big-img{
  max-height:140px !important;
}

#resultText{
  font-weight:bold;
  font-size:22px;
}

.divider{
  width:90%;
  height:2px;
  background:black;
  margin:6px auto;
}

.stats{
  font-weight:bold;
  font-size:18px;
  text-align:left;
  padding-left:20px;
}

#gaInside{
  width:55px;
  position:absolute;
  right:10px;
  bottom:10px;
}

.inputBox{
  margin-top:15px;
  padding:10px;
}

.saveBtn{
  margin-top:10px;
  padding:10px 20px;
  background:black;
  color:white;
  border:none;
}
</style>
</head>

<body>

<img id="moku" class="corner" src="https://raw.githubusercontent.com/itszavoo/mokutm/main/moku.png">
<img id="ga" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/ga.jpeg">
<img id="star" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/star.jpeg">

<div id="watermark">Made by Zavo</div>

<!-- HOME -->
<div id="home" class="section">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <button id="enterBtn" onclick="startQuiz()">Enter</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section" style="display:none;">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div class="box">
    <div id="progress"></div>
    <div id="timer"></div>
    <div id="streak"></div>
    <div id="question"></div>
    <div id="options"></div>
  </div>
</div>

<!-- SCORE -->
<div id="scoreCard" class="section" style="display:none;">

  <div class="card">
    <div id="resultImg" class="card-top"></div>
    <h2 id="resultText"></h2>
    <div class="divider"></div>

    <div class="stats">
      <p id="finalScore"></p>
      <p id="finalStreak"></p>
    </div>

    <img id="gaInside" src="https://raw.githubusercontent.com/itszavoo/images/main/gag.jpeg">
  </div>

  <input id="name" placeholder="Enter your name" class="inputBox">
  <button onclick="saveScore()" class="saveBtn">Save</button>

  <!-- NEW BUTTON -->
  <button onclick="downloadCard()" class="saveBtn">Download Card</button>

</div>

<script>
let q = [
["Total number of Scheme cards in Grand Arena?",["32","35","38"],1],
["If a lineup uses a Scheme card that rewards rarity diversity, what is the optimal lineup structure?",["Full Legendary","Mixed rarity (one of each tier)","Random lineup"],1],
["What does Fortitude mainly affect?",["Damage","Respawn and deposit time","Speed"],1],
["Which Scheme card benefits from unique categories in a lineup?",["Whale Watching","Collect ’Em All","Power Play"],1],
["Which stat is least likely tied to defensive mechanics?",["Fortitude","Dexterity","Endurance"],1],
["Which rarity card gives a 1.75x points multiplier?",["Epic","Rare","Legendary"],2],
["Which stat would help maintain performance consistency across matches?",["Endurance","Strength","Fortitude"],2],
["Which contest type is best for consistent returns over time?",["Top 20%","50/50","Free"],1],
["What matters most in Grand Arena at high level?",["Card rarity","Number of entries","Decision making quality"],2],
["Does higher rarity always mean better contest performance?",["Yes","No","Mostly"],1]
];

let i=0, score=0, streak=0, timer;

function startQuiz(){
  home.style.display="none";
  quiz.style.display="flex";
  loadQ();
}

function loadQ(){
  if(i>=q.length){end();return;}

  question.innerText=q[i][0];
  streak.innerText="Streak: "+streak;

  let html="";
  q[i][1].forEach((o,index)=>{
    html+=`<div class="option" onclick="check(${index},this)">${o}</div>`;
  });

  options.innerHTML=html;
}

function check(ans,el){
  if(ans==q[i][2]){
    el.classList.add("correct");
    score += (streak>0?2:1);
    streak++;
  } else {
    el.classList.add("wrong");
    streak=0;
  }

  setTimeout(()=>{i++;loadQ();},500);
}

function end(){
  quiz.style.display="none";
  scoreCard.style.display="flex";

  let img,text;

  if(score<10){
    img="https://raw.githubusercontent.com/itszavoo/images/main/mouse.jpeg";
    text="Rookie !!";
  }
  else if(score<15){
    img="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg";
    text="GA Chad !!";
  }
  else{
    img="https://raw.githubusercontent.com/itszavoo/images/main/winner.jpeg";
    text="GA Legend !!";
  }

  resultImg.innerHTML=`<img src="${img}">`;
  resultText.innerText=text;
  finalScore.innerText="Score: "+score+" / 20";
  finalStreak.innerText="Streak: "+streak;
}

/* UPDATED NAME FUNCTION */
function saveScore(){
  let name=document.getElementById("name").value;
  if(!name)return;

  let txt=resultText.innerText;
  if(!txt.includes("(")){
    resultText.innerText = txt + " ("+name+")";
  }
}

/* DOWNLOAD FUNCTION */
function downloadCard(){
  html2canvas(document.querySelector(".card")).then(canvas=>{
    let link=document.createElement("a");
    link.download="scorecard.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

<!-- REQUIRED -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena</title>

<!-- DOWNLOAD LIB -->
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2673E8;
}

/* CORNERS */
.corner{position:fixed;z-index:10;}
#moku{top:12px;left:12px;width:70px;}
#ga{top:12px;right:12px;width:70px;}
#star{bottom:12px;left:12px;width:65px;}

#watermark{
  position:fixed;
  bottom:12px;
  right:12px;
  color:white;
  font-weight:bold;
}

/* CENTER */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

#logo{
  width:260px;
  margin-bottom:35px;
  margin-top:-40px;
}

/* BUTTON */
#enterWrap{
  display:flex;
  align-items:center;
  gap:12px;
}

.sword{font-size:22px;}

#enterBtn{
  padding:14px 36px;
  font-size:18px;
  background:#00c853;
  border:2px solid black;
  border-radius:10px;
  font-weight:bold;
}

/* QUIZ */
.box{
  background:black;
  color:white;
  padding:20px;
  width:100%;
  max-width:480px;
  border-radius:14px;
}

.option{
  background:white;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.correct{
  background:#00c853 !important;
  box-shadow:0 0 12px #00ff88;
}

.wrong{background:#ff3b30 !important;}

/* SCORECARD */
.card{
  background:#00c853;
  border:3px solid black;
  border-radius:12px;
  width:320px;
  overflow:hidden;
  position:relative;
}

/* IMAGE */
.card-top{
  display:flex;
  justify-content:center;
  align-items:center;
  height:140px;
}

.card-top img{
  max-height:90px;
}

.big-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
#resultText{
  font-weight:bold;
  font-size:22px;
  margin:10px 0;
}

/* LINE */
.divider{
  width:90%;
  height:2px;
  background:black;
  margin:6px auto;
}

/* STATS */
.stats{
  font-weight:bold;
  font-size:18px;
  text-align:left;
  padding-left:20px;
}

/* GA ICON */
#gaInside{
  width:70px;
  position:absolute;
  right:10px;
  bottom:10px;
}

.inputBox{
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.saveBtn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<img id="moku" class="corner" src="https://raw.githubusercontent.com/itszavoo/mokutm/main/moku.png">
<img id="ga" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/ga.jpeg">
<img id="star" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/star.jpeg">

<div id="watermark">Made by Zavo</div>

<!-- HOME -->
<div id="home" class="section">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div id="enterWrap">
    ⚔️ <button id="enterBtn" onclick="startQuiz()">Enter</button> ⚔️
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="section" style="display:none;">
  <div class="box">
    <div id="question"></div>
    <div id="options"></div>
  </div>
</div>

<!-- SCORE -->
<div id="scoreCard" class="section" style="display:none;">

  <div class="card">

    <div id="resultImg" class="card-top"></div>

    <div class="divider"></div>

    <h2 id="resultText"></h2>

    <div class="stats">
      <p id="finalScore"></p>
      <p id="finalStreak"></p>
    </div>

    <img id="gaInside" src="https://raw.githubusercontent.com/itszavoo/images/main/gag.jpeg">

  </div>

  <input id="name" placeholder="Enter your name" class="inputBox">
  <button onclick="saveScore()" class="saveBtn">Save</button>
  <button onclick="downloadCard()" class="saveBtn">Download Card</button>

</div>

<script>
let q = [
["Total number of Scheme cards in Grand Arena?",["32","35","38"],1],
["If a lineup uses a Scheme card that rewards rarity diversity, what is the optimal lineup structure?",["Full Legendary","Mixed rarity (one of each tier)","Random lineup"],1]
];

let i=0, score=0, streak=0;

function startQuiz(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="flex";
  loadQ();
}

function loadQ(){
  if(i>=q.length){end();return;}

  document.getElementById("question").innerText=q[i][0];

  let html="";
  q[i][1].forEach((o,index)=>{
    html+=`<div class="option" onclick="check(${index},this)">${o}</div>`;
  });

  document.getElementById("options").innerHTML=html;
}

function check(ans,el){
  if(ans==q[i][2]){
    score+=1;
    streak++;
  } else {
    streak=0;
  }
  i++;
  loadQ();
}

function end(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("scoreCard").style.display="flex";

  let img,text,isBig=false;

  if(score < 1){
    img="https://raw.githubusercontent.com/itszavoo/images/main/mouse.jpeg";
    text="Rookie !!";
  }
  else if(score < 2){
    img="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg";
    text="GA Chad !!";
  }
  else{
    img="https://raw.githubusercontent.com/itszavoo/images/main/winner.jpeg";
    text="GA Legend !!";
    isBig = true;
  }

  document.getElementById("resultImg").innerHTML =
    `<img src="${img}" class="${isBig ? 'big-img' : ''}">`;

  document.getElementById("resultText").innerText=text;

  document.getElementById("finalScore").innerText="Score: "+score+" / 20";
  document.getElementById("finalStreak").innerText="Streak: "+streak;
}

function saveScore(){
  let name=document.getElementById("name").value;
  if(!name)return;

  let text=document.getElementById("resultText").innerText;
  document.getElementById("resultText").innerText=text+" ("+name+")";
}

function downloadCard(){
  const card=document.querySelector(".card");

  html2canvas(card).then(canvas=>{
    const link=document.createElement("a");
    link.download="GA-scorecard.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>

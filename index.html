<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2673E8;
}

/* CORNERS */
.corner{position:fixed;z-index:10;}
#moku{top:12px;left:12px;width:70px;}
#ga{top:12px;right:12px;width:70px;}
#star{bottom:12px;left:12px;width:65px;}

#watermark{
  position:fixed;
  bottom:12px;
  right:12px;
  color:white;
  font-weight:bold;
}

/* CENTER */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
  transition:all 0.4s ease;
}

#logo{
  width:260px;
  margin-bottom:35px;
  margin-top:-40px;
}

#quiz #logo{
  margin-top:-60px;
}

/* BUTTON */
#enterWrap{
  display:flex;
  align-items:center;
  gap:12px;
}

.sword{font-size:22px;}

#enterBtn{
  padding:14px 36px;
  font-size:18px;
  background:#00c853;
  border:2px solid black;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.subtitle{
  color:white;
  font-weight:bold;
  margin-top:16px;
  font-size:18px;
}

/* QUIZ */
.box{
  background:black;
  color:white;
  padding:20px;
  width:100%;
  max-width:480px;
  border-radius:14px;
}

#progressBarWrap{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:#00c853;
  transition:0.4s;
}

#timerBarWrap{
  width:100%;
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

#timerBar{
  height:100%;
  width:100%;
  background:#ff3b30;
  transition:1s linear;
}

#question{
  font-size:19px;
  font-weight:bold;
  margin:15px 0;
}

.option{
  background:white;
  color:black;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
}

.option:hover{transform:scale(1.03);}

.correct{
  background:#00c853 !important;
  box-shadow:0 0 12px #00ff88;
}

.wrong{background:#ff3b30 !important;}

.shake{animation:shake 0.25s;}
@keyframes shake{
  25%{transform:translateX(-4px);}
  50%{transform:translateX(4px);}
}

/* SCORECARD */
.card{
  background:#00c853;
  border:3px solid black;
  border-radius:12px;
  width:320px;
  overflow:hidden;
  position:relative;
  margin:0 auto;
}

.card-top{
  display:flex;
  justify-content:center;
  align-items:center;
  height:140px;
}

.card-top img{
  max-height:110px;
}

.big-img{
  max-height:140px !important;
}

#resultText{
  font-weight:bold;
  font-size:22px;
  color:black;
  margin:8px 0;
}

.divider{
  width:90%;
  height:2px;
  background:black;
  margin:6px auto;
}

.stats{
  font-weight:bold;
  font-size:18px;
  color:black;
  text-align:left;
  padding-left:20px;
}

#gaInside{
  width:55px;
  position:absolute;
  right:10px;
  bottom:10px;
}

.inputBox{
  margin-top:15px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.saveBtn{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<img id="moku" class="corner" src="https://raw.githubusercontent.com/itszavoo/mokutm/main/moku.png">
<img id="ga" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/ga.jpeg">
<img id="star" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/star.jpeg">

<div id="watermark">Made by Zavo</div>

<!-- HOME -->
<div id="home" class="section">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div id="enterWrap">
    <span class="sword">⚔️</span>
    <button id="enterBtn" onclick="startQuiz()">Enter</button>
    <span class="sword">⚔️</span>
  </div>

  <div class="subtitle">
    Only the strongest qualify 
    <img src="https://raw.githubusercontent.com/itszavoo/images/main/chadb.jpeg" width="36">
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="section" style="display:none;">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div class="box">

    <div id="progressBarWrap"><div id="progressBar"></div></div>
    <div id="timerBarWrap"><div id="timerBar"></div></div>

    <div id="progress"></div>
    <div id="timer"></div>
    <div id="streak"></div>
    <div id="question"></div>
    <div id="options"></div>

  </div>
</div>

<!-- SCORE -->
<div id="scoreCard" class="section" style="display:none; padding-top:40px;">

  <div class="card">

    <div id="resultImg" class="card-top"></div>

    <h2 id="resultText"></h2>

    <div class="divider"></div>

    <div class="stats">
      <p id="finalScore"></p>
      <p id="finalStreak"></p>
    </div>

    <img id="gaInside" src="https://raw.githubusercontent.com/itszavoo/images/refs/heads/main/gag.jpeg">

  </div>

  <div style="margin-top:20px;">
    <input id="name" placeholder="Enter your name" class="inputBox">
    <button onclick="saveScore()" class="saveBtn">Save</button>
    <!-- DOWNLOAD BUTTON -->
    <button onclick="downloadCard()" class="saveBtn">Download Card</button>
  </div>

</div>

<script>
let q = [
["Total number of Scheme cards in Grand Arena?",["32","35","38"],1],
["If a lineup uses a Scheme card that rewards rarity diversity, what is the optimal lineup structure?",["Full Legendary","Mixed rarity (one of each tier)","Random lineup"],1],
["What does Fortitude mainly affect?",["Damage","Respawn and deposit time","Speed"],1],
["Which Scheme card benefits from unique categories in a lineup?",["Whale Watching","Collect ’Em All","Power Play"],1],
["Which stat is least likely tied to defensive mechanics?",["Fortitude","Dexterity","Endurance"],1],
["Which rarity card gives a 1.75x points multiplier?",["Epic","Rare","Legendary"],2],
["Which stat would help maintain performance consistency across matches?",["Endurance","Strength","Fortitude"],2],
["Which contest type is best for consistent returns over time?",["Top 20%","50/50","Free"],1],
["What matters most in Grand Arena at high level?",["Card rarity","Number of entries","Decision making quality"],2],
["Does higher rarity always mean better contest performance?",["Yes","No","Mostly"],1]
];

let i=0, score=0, streak=0;
let timerInterval;

function startQuiz(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="flex";
  loadQ();
}

function loadQ(){
  if(i>=q.length){end();return;}

  document.getElementById("question").innerText=q[i][0];
  document.getElementById("progress").innerText=(i+1)+"/10";
  document.getElementById("streak").innerText="Streak: "+streak;

  document.getElementById("progressBar").style.width=(i/q.length)*100+"%";

  let html="";
  q[i][1].forEach((o,index)=>{
    html+=`<div class="option" onclick="check(${index},this)">${o}</div>`;
  });

  document.getElementById("options").innerHTML=html;

  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);

  let time=20;
  document.getElementById("timer").innerText="Time: "+time;
  document.getElementById("timerBar").style.width="100%";

  timerInterval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;
    document.getElementById("timerBar").style.width=(time/20)*100+"%";

    if(time<=0){
      clearInterval(timerInterval);
      streak=0;
      i++;
      loadQ();
    }
  },1000);
}

function check(ans,el){
  clearInterval(timerInterval);

  if(ans==q[i][2]){
    el.classList.add("correct","shake");

    if(streak>0){score+=2;} else{score+=1;}
    streak++;

    el.innerHTML+=` <img src="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg" width="18">`;

  } else {
    el.classList.add("wrong","shake");
    streak=0;
  }

  setTimeout(()=>{i++;loadQ();},700);
}

function end(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("scoreCard").style.display="flex";

  let img,text,isBig=false;

  if(score < 10){
    img="https://raw.githubusercontent.com/itszavoo/images/main/mouse.jpeg";
    text="Rookie !!";
  }
  else if(score < 15){
    img="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg";
    text="GA Chad !!";
  }
  else{
    img="https://raw.githubusercontent.com/itszavoo/images/main/winner.jpeg";
    text="GA Legend !!";
    isBig = true;
  }

  document.getElementById("resultImg").innerHTML =
    `<img src="${img}" class="${isBig ? 'big-img' : ''}" crossorigin="anonymous">`;

  document.getElementById("resultText").innerText=text;

  document.getElementById("finalScore").innerText="Score: "+score+" / 19";
  document.getElementById("finalStreak").innerText="Streak: "+streak;
}

/* NAME FIX */
function saveScore(){
  let name=document.getElementById("name").value;
  if(!name)return;

  let txt=document.getElementById("resultText").innerText;
  if(!txt.includes("(")){
    document.getElementById("resultText").innerText = txt + " ("+name+")";
  }
}

/* DOWNLOAD FIX */
function downloadCard(){
  let card=document.querySelector(".card");

  html2canvas(card,{
    useCORS:true,
    allowTaint:true
  }).then(canvas=>{
    let link=document.createElement("a");
    link.download="GrandArenaScore.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2673E8;
}

/* CORNERS */
.corner{position:fixed;z-index:10;}
#moku{top:12px;left:12px;width:70px;}
#ga{top:12px;right:12px;width:70px;}
#star{bottom:12px;left:12px;width:65px;}

#watermark{
  position:fixed;
  bottom:12px;
  right:12px;
  color:white;
  font-weight:bold;
}

/* CENTER */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

#logo{
  width:260px;
  margin-bottom:35px;
  margin-top:-40px;
}

#quiz #logo{
  margin-top:-60px;
}

/* BUTTON */
#enterWrap{
  display:flex;
  align-items:center;
  gap:12px;
}

#enterBtn{
  padding:14px 36px;
  font-size:18px;
  background:#00c853;
  border:2px solid black;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.subtitle{
  color:white;
  font-weight:bold;
  margin-top:16px;
  font-size:18px;
}

/* QUIZ */
.box{
  background:black;
  color:white;
  padding:20px;
  width:100%;
  max-width:480px;
  border-radius:14px;
}

#progressBarWrap{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

#progressBar{
  height:100%;
  width:0%;
  background:#00c853;
  transition:0.4s;
}

#timerBarWrap{
  width:100%;
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

#timerBar{
  height:100%;
  width:100%;
  background:#ff3b30;
  transition:1s linear;
}

#question{
  font-size:19px;
  font-weight:bold;
  margin:15px 0;
}

.option{
  background:white;
  color:black;
  padding:14px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
}

.correct{
  background:#00c853 !important;
}

.wrong{background:#ff3b30 !important;}

/* SCORECARD */
.card{
  background:#00c853;
  border:3px solid black;
  border-radius:12px;
  width:320px;
  overflow:hidden;
  position:relative;
}

.card-top{
  display:flex;
  justify-content:center;
  align-items:center;
  height:140px;
}

.card-top img{
  max-height:110px;
}

.big-img{
  max-height:140px !important;
}

#resultText{
  font-weight:bold;
  font-size:22px;
  color:black;
}

.divider{
  width:90%;
  height:2px;
  background:black;
  margin:6px auto;
}

.stats{
  font-weight:bold;
  font-size:18px;
  color:black;
  text-align:left;
  padding-left:20px;
}

#gaInside{
  width:55px;
  position:absolute;
  right:10px;
  bottom:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="section">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div id="enterWrap">
    <button id="enterBtn" onclick="startQuiz()">Enter</button>
  </div>

  <div class="subtitle">
    Only the strongest qualify 
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="section" style="display:none;">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div class="box">
    <div id="progressBarWrap"><div id="progressBar"></div></div>
    <div id="timerBarWrap"><div id="timerBar"></div></div>

    <div id="progress"></div>
    <div id="timer"></div>
    <div id="streak"></div>
    <div id="question"></div>
    <div id="options"></div>
  </div>
</div>

<!-- SCORE -->
<div id="scoreCard" class="section" style="display:none;">

  <div class="card">
    <div id="resultImg" class="card-top"></div>

    <div class="divider"></div>

    <h2 id="resultText"></h2>

    <div class="stats">
      <p id="finalScore"></p>
      <p id="finalStreak"></p>
    </div>

    <img id="gaInside" src="https://raw.githubusercontent.com/itszavoo/images/main/gag.jpeg">
  </div>

  <input id="name" placeholder="Enter your name">
  <button onclick="saveScore()">Save</button>

</div>

<script>

let q = [
["Total number of Scheme cards in Grand Arena?",["32","35","38"],1],
["If a lineup uses a Scheme card that rewards rarity diversity, what is the optimal lineup structure?",["Full Legendary","Mixed rarity (one of each tier)","Random lineup"],1],
["What does Fortitude mainly affect?",["Damage","Respawn and deposit time","Speed"],1],
["Which Scheme card benefits from unique categories in a lineup?",["Whale Watching","Collect ’Em All","Power Play"],1],
["Which stat is least likely tied to defensive mechanics?",["Fortitude","Dexterity","Endurance"],1],
["Which rarity card gives a 1.75x points multiplier?",["Epic","Rare","Legendary"],2],
["Which stat would help maintain performance consistency across matches?",["Endurance","Strength","Fortitude"],2],
["Which contest type is best for consistent returns over time?",["Top 20%","50/50","Free"],1],
["What matters most in Grand Arena at high level?",["Card rarity","Number of entries","Decision making quality"],2],
["Does higher rarity always mean better contest performance?",["Yes","No","Mostly"],1]
];

let i=0, score=0, streak=0, timer;

function startQuiz(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="flex";
  loadQ();
}

function loadQ(){
  if(i>=q.length){end();return;}

  document.getElementById("question").innerText=q[i][0];
  document.getElementById("progress").innerText=(i+1)+"/10";
  document.getElementById("streak").innerText="Streak: "+streak;

  let html="";
  q[i][1].forEach((o,index)=>{
    html+=`<div class="option" onclick="check(${index},this)">${o}</div>`;
  });
  document.getElementById("options").innerHTML=html;

  startTimer();
}

function startTimer(){
  clearInterval(timer);
  let t=20;
  document.getElementById("timer").innerText="Time: "+t;

  timer=setInterval(()=>{
    t--;
    document.getElementById("timer").innerText="Time: "+t;
    if(t<=0){
      clearInterval(timer);
      streak=0;
      i++;
      loadQ();
    }
  },1000);
}

function check(ans,el){
  clearInterval(timer);

  if(ans==q[i][2]){
    el.classList.add("correct");

    if(streak>0){
      score += 2;
    } else {
      score += 1;
    }

    streak++;

    el.innerHTML += ` <img src="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg" width="18">`;

  } else {
    el.classList.add("wrong");
    streak=0;
  }

  setTimeout(()=>{
    i++;
    loadQ();
  },600);
}

function end(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("scoreCard").style.display="flex";

  let img,text;

  if(score<10){
    img="https://raw.githubusercontent.com/itszavoo/images/main/mouse.jpeg";
    text="Rookie !!";
  }
  else if(score<15){
    img="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg";
    text="GA Chad !!";
  }
  else{
    img="https://raw.githubusercontent.com/itszavoo/images/main/winner.jpeg";
    text="GA Legend !!";
  }

  document.getElementById("resultImg").innerHTML=`<img src="${img}">`;
  document.getElementById("resultText").innerText=text;
  document.getElementById("finalScore").innerText="Score: "+score+"/20";
  document.getElementById("finalStreak").innerText="Streak: "+streak;
}

function saveScore(){
  let name=document.getElementById("name").value;
  if(!name)return;

  document.getElementById("resultText").innerText += " ("+name+")";
}

</script>

</body>
</html>

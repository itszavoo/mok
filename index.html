<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Arena</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2673E8;
}

/* CORNERS */
.corner{position:fixed;z-index:10;}
#moku{top:12px;left:12px;width:70px;}
#ga{top:12px;right:12px;width:70px;}
#star{bottom:12px;left:12px;width:65px;}

#watermark{
  position:fixed;
  bottom:12px;
  right:12px;
  color:white;
  font-weight:bold;
}

/* CENTER */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* LOGO */
#logo{
  width:260px;
  margin-bottom:30px;
  margin-top:-40px;
}

#quiz #logo{
  margin-top:-60px;
}

/* ENTER */
#enterWrap{
  display:flex;
  align-items:center;
  gap:12px;
}

#enterBtn{
  padding:14px 36px;
  font-size:18px;
  background:#00c853;
  border:2px solid black;
  border-radius:10px;
  font-weight:bold;
}

/* QUIZ */
.box{
  background:black;
  color:white;
  padding:20px;
  width:100%;
  max-width:480px;
  border-radius:14px;
}

#progressBarWrap{height:8px;background:#333;border-radius:10px;}
#progressBar{height:100%;background:#00c853;width:0%;}

#timerBarWrap{height:6px;background:#222;border-radius:10px;margin-top:5px;}
#timerBar{height:100%;background:#ff3b30;width:100%;}

.option{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{transform:scale(1.03);}

.correct{
  background:#00c853 !important;
  box-shadow:0 0 10px #00ff88;
}

.wrong{background:#ff3b30 !important;}

/* ===== ELITE SCORECARD ===== */
.card{
  width:340px;
  border-radius:18px;
  overflow:hidden;
  margin:0 auto;
  background:linear-gradient(135deg,#00c853,#00e676);
  border:3px solid black;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  position:relative;
}

.card-top{
  display:flex;
  justify-content:center;
  align-items:center;
  height:160px;
}

.card-top img{
  max-height:120px;
}

.big-img{
  max-height:160px !important;
}

#resultText{
  font-size:24px;
  font-weight:900;
  margin:5px 0;
}

.divider{
  height:2px;
  background:black;
  margin:8px auto;
  width:85%;
}

#playerName{
  font-weight:bold;
  font-size:18px;
}

.stats{
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  font-weight:bold;
}

#gaInside{
  width:60px;
  position:absolute;
  right:10px;
  bottom:10px;
}

/* INPUT */
.inputBox{
  margin-top:20px;
  padding:10px;
  border-radius:8px;
  border:none;
}

.saveBtn{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* LEADERBOARD */
#leaderboard{
  background:black;
  color:white;
  margin-top:20px;
  padding:10px;
  width:300px;
}
</style>
</head>

<body>

<img id="moku" class="corner" src="https://raw.githubusercontent.com/itszavoo/mokutm/main/moku.png">
<img id="ga" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/ga.jpeg">
<img id="star" class="corner" src="https://raw.githubusercontent.com/itszavoo/images/main/star.jpeg">

<div id="watermark">Made by Zavo</div>

<!-- HOME -->
<div id="home" class="section">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div id="enterWrap">
    ⚔️ <button id="enterBtn" onclick="startQuiz()">Enter</button> ⚔️
  </div>

  <p style="color:white;font-weight:bold;">
    Only the strongest qualify 
    <img src="https://raw.githubusercontent.com/itszavoo/images/main/chadb.jpeg" width="36">
  </p>
</div>

<!-- QUIZ -->
<div id="quiz" class="section" style="display:none;">
  <img id="logo" src="https://raw.githubusercontent.com/itszavoo/images/main/logo.jpeg">

  <div class="box">
    <div id="progressBarWrap"><div id="progressBar"></div></div>
    <div id="timerBarWrap"><div id="timerBar"></div></div>

    <div id="progress"></div>
    <div id="timer"></div>
    <div id="streak"></div>
    <div id="question"></div>
    <div id="options"></div>
  </div>
</div>

<!-- SCORE -->
<div id="scoreCard" class="section" style="display:none; padding-top:40px;">

  <div class="card">

    <div id="resultImg" class="card-top"></div>

    <h2 id="resultText"></h2>

    <div class="divider"></div>

    <p id="playerName"></p>

    <div class="stats">
      <span id="finalScore"></span>
      <span id="finalStreak"></span>
    </div>

    <img id="gaInside" src="https://raw.githubusercontent.com/itszavoo/images/main/ga.jpeg">

  </div>

  <input id="name" placeholder="Enter your name" class="inputBox">
  <button onclick="saveScore()" class="saveBtn">Save</button>
  <button onclick="downloadCard()" class="saveBtn">Download</button>

  <div id="leaderboard"></div>
</div>

<script>
let q=[["Total number of Scheme cards in Grand Arena?",["32","35","38"],1]];

let i=0,score=0,streak=0,timerInterval;

function startQuiz(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="flex";
  loadQ();
}

function loadQ(){
  document.getElementById("question").innerText=q[i][0];

  let html="";
  q[i][1].forEach((o,index)=>{
    html+=`<div class="option" onclick="check(${index},this)">${o}</div>`;
  });

  document.getElementById("options").innerHTML=html;
}

function check(ans,el){
  if(ans==q[i][2]){
    el.classList.add("correct");
    score=12; // demo
  }
  setTimeout(end,800);
}

function end(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("scoreCard").style.display="flex";

  let img,text,big=false;

  if(score<10){
    img="https://raw.githubusercontent.com/itszavoo/images/main/mouse.jpeg";
    text="Rookie !!";
  } else if(score<15){
    img="https://raw.githubusercontent.com/itszavoo/images/main/chadg.jpeg";
    text="GA Chad !!";
  } else{
    img="https://raw.githubusercontent.com/itszavoo/images/main/winner.jpeg";
    text="GA Legend !!";
    big=true;
  }

  document.getElementById("resultImg").innerHTML=
    `<img src="${img}" class="${big?'big-img':''}">`;

  document.getElementById("resultText").innerText=text;
  document.getElementById("finalScore").innerText=score+"/20";
  document.getElementById("finalStreak").innerText="🔥 "+streak;
}

function saveScore(){
  let name=document.getElementById("name").value;
  document.getElementById("playerName").innerText=name;
}

function downloadCard(){
  const card=document.querySelector(".card");

  html2canvas(card).then(canvas=>{
    let link=document.createElement("a");
    link.download="score.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
